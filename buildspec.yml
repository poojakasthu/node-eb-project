version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 18
    commands:
      - echo Installing dependencies...
      - npm install

  pre_build:
    commands:
      - echo Pre-build phase complete

  build:
    commands:
      - echo No build step required for Express app

  post_build:
    commands:
      - echo Build completed successfully

artifacts:
  files:
    - '**/*'
