<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TravelGo Admin Dashboard</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<header>

<div class="logo">

🌍 TravelGo Admin

</div>

<nav>

<a href="/">Home</a>

<button id="refreshBtn">

🔄 Refresh

</button>

<button id="darkBtn">

🌙 Dark Mode

</button>

<button id="logoutBtn">

Logout

</button>

</nav>

</header>

<section class="dashboard-header">

<h1>

Welcome,

<span id="adminName">

Administrator

</span>

</h1>

<p>

Manage bookings, payments and customers.

</p>

</section>

<section>

<div class="stats">

<div class="stat-card">

<h2 id="totalBookings">

0

</h2>

<p>Total Bookings</p>

</div>

<div class="stat-card">

<h2 id="confirmedBookings">

0

</h2>

<p>Confirmed</p>

</div>

<div class="stat-card">

<h2 id="cancelledBookings">

0

</h2>

<p>Cancelled</p>

</div>

<div class="stat-card">

<h2>

₹<span id="totalRevenue">

0

</span>

</h2>

<p>Total Revenue</p>

</div>

</div>

</section>

<section>

<h2>

Booking Management

</h2>

<input

type="text"

id="searchBooking"

placeholder="Search by customer, destination or phone..."

onkeyup="searchBooking()"

>

<table>

<thead>

<tr>

<th>ID</th>

<th>Customer</th>

<th>Destination</th>

<th>Phone</th>

<th>Payment</th>

<th>Status</th>

<th>Booked On</th>

<th>Actions</th>

</tr>

</thead>

<tbody id="bookingTable">

</tbody>

</table>

</section>

<section>

<h2>

Server Status

</h2>

<p id="healthStatus">

Checking...

</p>

</section>

<div id="toast" class="toast"></div>

<footer>

<p>

© 2026 TravelGo Admin Dashboard

</p>

</footer>

<script src="js/dashboard.js"></script>

</body>

</html>
